
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: research_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  task-service:
    build: ./task-service
    ports:
      - "8001:8001"
    env_file: .env
    depends_on:
      - postgres

  agent-orchestrator:
    build: ./agent-orchestrator
    ports:
      - "8002:8002"
    env_file: .env
    depends_on:
      - task-service

  gateway-service:
    build: ./gateway-service
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - task-service
      - agent-orchestrator

volumes:
  pgdata:
