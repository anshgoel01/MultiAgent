
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: research_db
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  task-service:
    build: ./task-service
    env_file: .env
    depends_on:
      - postgres

  agent-orchestrator:
    build: ./agent-orchestrator
    env_file: .env
    depends_on:
      - postgres
      - task-service

  gateway-service:
    build: ./gateway-service
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - task-service
      - agent-orchestrator

volumes:
  pgdata:
